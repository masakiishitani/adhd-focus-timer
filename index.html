<!--
  ==============================================================
  ADHD Focus Timer
  カウントアップ型・集中継続タイマー

  【概要】
  ポモドーロ版から派生した新版。
  カウントダウンではなくカウントアップ方式を採用し、
  自動休憩ではなくユーザー自発の一時中断方式で集中を支援する。
  15分ごとの節目通知で「ここまで来た」を可視化し、
  集計画面で成果を確認できる。

  単一HTMLファイルで完結。ダブルクリックで利用可能。
  ==============================================================
-->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Focus Timer</title>
    <style>
        /* ============== Reset & Base ============== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0010;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* ============== Screen System ============== */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* ============== Main Screen ============== */
        #main-screen {
            max-width: 1400px;
            margin: 0 auto;
            justify-content: flex-start;
            padding-top: 5vh;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            width: 100%;
            margin-bottom: 20px;
        }

        .task-slot {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a0a2e;
            padding: 15px 25px;
            border-radius: 16px;
            transition: transform 0.2s;
            position: relative;
        }

        .task-slot:focus-within {
            background: #2a1040;
            transform: scale(1.02);
        }

        .task-slot input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            outline: none;
            min-width: 0;
        }

        .task-slot input::placeholder {
            color: #666;
            font-size: 30px;
        }

        .btn-remove {
            background: transparent;
            color: #888;
            border: none;
            font-size: 40px;
            cursor: pointer;
            padding: 0 10px;
            transition: 0.2s;
        }

        .btn-remove:hover {
            color: #ff4d8d;
            transform: scale(1.2);
        }

        .btn-start-direct {
            background: #6a1b9a;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-start-direct:hover {
            background: #9c27b0;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-add-task {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px dashed #666;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add-task:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .btn-add-task:disabled {
            background: transparent;
            color: #444;
            border-color: #333;
            cursor: not-allowed;
        }

        .btn-roulette {
            background: #c2185b;
            color: #fff;
            border: none;
            padding: 50px 80px;
            font-size: 80px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 15px 0 #880e4f;
            transition: 0.1s;
            width: 100%;
            text-align: center;
            letter-spacing: 5px;
            margin-top: auto;
            margin-bottom: 5vh;
        }

        .btn-roulette:active {
            transform: translateY(15px);
            box-shadow: 0 0 0 #880e4f;
        }

        .btn-roulette:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #888;
            border: 2px solid #555;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            color: #fff;
            border-color: #aaa;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-summary {
            background: rgba(206, 147, 216, 0.15);
            color: #ce93d8;
            border: 2px solid #ce93d8;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-summary:hover {
            background: rgba(206, 147, 216, 0.3);
        }

        /* ============== Focus Screen ============== */
        #focus-screen {
            position: relative;
        }

        #focus-task-display {
            font-size: 8vw;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
            padding: 0 20px;
            word-break: break-word;
            color: #e0e0e0;
        }

        #focus-timer-display {
            font-size: 20vw;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            user-select: none;
            color: #fff;
            transition: font-size 0.3s ease;
        }

        .focus-buttons {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }

        .btn-pause {
            background: #4a148c;
            color: #fff;
            border: none;
            padding: 25px 60px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pause:hover {
            background: #7b1fa2;
        }

        .btn-finish {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 2px solid #555;
            padding: 25px 60px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-finish:hover {
            color: #fff;
            border-color: #aaa;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ============== Pause Screen ============== */
        #pause-screen {
            background-color: #0d0018;
        }

        #pause-title {
            font-size: 6vw;
            margin-bottom: 20px;
            color: #888;
        }

        #pause-timer-display {
            font-size: 15vw;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            user-select: none;
            color: #666;
        }

        .pause-buttons {
            display: flex;
            gap: 30px;
            margin-top: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-resume {
            background: #ad1457;
            color: #fff;
            border: none;
            padding: 25px 60px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 0 #880e4f;
            transition: 0.1s;
        }

        .btn-resume:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #880e4f;
        }

        .btn-pause-finish {
            background: #4a148c;
            color: #fff;
            border: none;
            padding: 25px 60px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pause-finish:hover {
            background: #7b1fa2;
        }

        .btn-return-main {
            background: transparent;
            color: #888;
            border: 2px solid #555;
            padding: 20px 40px;
            font-size: 30px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn-return-main:hover {
            color: #fff;
            border-color: #aaa;
        }

        /* ============== Summary Modal ============== */
        #summary-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            overflow-y: auto;
            padding: 40px 20px;
        }

        #summary-modal.active {
            display: flex;
        }

        #summary-modal h2 {
            font-size: 44px;
            margin-bottom: 30px;
            color: #ce93d8;
        }

        .summary-hero {
            text-align: center;
            margin-bottom: 30px;
        }

        .summary-hero-label {
            font-size: 28px;
            color: #888;
            margin-bottom: 10px;
        }

        .summary-hero-value {
            font-size: 72px;
            color: #f48fb1;
            text-shadow: 0 0 30px rgba(244, 143, 177, 0.4);
            font-variant-numeric: tabular-nums;
        }

        .summary-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .summary-stat-card {
            background: #1a0a2e;
            border: 1px solid #4a1060;
            border-radius: 16px;
            padding: 20px 30px;
            text-align: center;
            min-width: 180px;
        }

        .summary-stat-label {
            font-size: 20px;
            color: #888;
            margin-bottom: 8px;
        }

        .summary-stat-value {
            font-size: 36px;
            color: #e0e0e0;
        }

        .summary-section {
            width: 80%;
            max-width: 800px;
            background: #1a0a2e;
            border: 1px solid #4a1060;
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 20px;
        }

        .summary-section-title {
            font-size: 22px;
            color: #888;
            margin-bottom: 15px;
        }

        .ranking-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #282828;
            font-size: 28px;
        }

        .ranking-row:last-child {
            border-bottom: none;
        }

        .ranking-position {
            color: #555;
            width: 40px;
            flex-shrink: 0;
        }

        .ranking-task {
            color: #e0e0e0;
            flex: 1;
            margin: 0 15px;
            word-break: break-word;
        }

        .ranking-time {
            color: #ce93d8;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .best-session-display {
            font-size: 30px;
            color: #e0e0e0;
        }

        .best-session-display .task-name {
            color: #f48fb1;
        }

        .summary-empty {
            text-align: center;
            font-size: 30px;
            color: #666;
            padding: 40px 0;
        }

        .summary-actions {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-close-summary {
            background: #4a148c;
            color: #fff;
            border: none;
            padding: 20px 60px;
            font-size: 36px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-close-summary:hover {
            background: #7b1fa2;
        }

        .btn-export {
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            border: 2px solid #555;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-export:hover {
            color: #fff;
            border-color: #aaa;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-reset-log {
            background: transparent;
            color: #888;
            border: 1px solid #555;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-reset-log:hover {
            color: #ff4d8d;
            border-color: #ff4d8d;
        }

        /* ============== Settings Modal ============== */
        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #settings-modal.active {
            display: flex;
        }

        #settings-modal h2 {
            font-size: 50px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .settings-content {
            width: 80%;
            max-width: 600px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-size: 30px;
            color: #e0e0e0;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 70px;
            height: 38px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.3s;
            border-radius: 38px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 28px;
            width: 28px;
            left: 5px;
            bottom: 5px;
            background-color: #fff;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked+.toggle-slider {
            background-color: #ab47bc;
        }

        .toggle-switch input:checked+.toggle-slider:before {
            transform: translateX(32px);
        }

        .btn-save-settings {
            background: #c2185b;
            color: #fff;
            border: none;
            padding: 20px 60px;
            font-size: 36px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #880e4f;
        }

        .btn-save-settings:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #880e4f;
        }

        /* ============== Flash Overlay ============== */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
        }

        #flash-overlay.flash-red {
            background: rgba(194, 24, 91, 0.75);
            animation: flashAnim 1.8s ease-in-out forwards;
        }

        @keyframes flashAnim {
            0% { opacity: 0; }
            10% { opacity: 1; }
            25% { opacity: 0.1; }
            40% { opacity: 1; }
            55% { opacity: 0.1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ============== Milestone Message (Toast) ============== */
        #milestone-message {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            border: 2px solid #555;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            opacity: 0;
            z-index: 60;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            white-space: nowrap;
        }

        #milestone-message.show {
            animation: milestoneAnim 3.5s ease-out forwards;
        }

        @keyframes milestoneAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -30px);
            }
            8% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            85% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
        }

        /* ============== Recovery Banner ============== */
        #recovery-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #1a0030;
            border-bottom: 2px solid #ce93d8;
            padding: 20px 30px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
            gap: 20px;
        }

        #recovery-banner.active {
            display: flex;
        }

        #recovery-banner .recovery-text {
            font-size: 24px;
            color: #ce93d8;
        }

        #recovery-banner .recovery-actions {
            display: flex;
            gap: 15px;
        }

        .btn-recovery {
            padding: 10px 25px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-recovery-resume {
            background: #c2185b;
            color: #fff;
        }

        .btn-recovery-discard {
            background: #333;
            color: #aaa;
        }
        /* ============== Mobile Responsiveness ============== */
        @media (max-width: 768px) {
            /* Main Screen */
            .grid-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .task-slot input {
                font-size: 22px;
            }
            .task-slot input::placeholder {
                font-size: 18px;
            }
            .btn-remove {
                font-size: 32px;
            }
            .btn-start-direct {
                padding: 12px 16px;
                font-size: 18px;
            }
            .btn-add-task {
                padding: 12px;
                font-size: 18px;
            }
            .btn-roulette {
                padding: 25px;
                font-size: 28px;
                box-shadow: 0 8px 0 #9a0007;
                letter-spacing: 1px;
                margin-top: 10px;
            }
            .btn-roulette:active {
                transform: translateY(8px);
                box-shadow: 0 0 0 #9a0007;
            }
            .controls-row {
                flex-direction: column;
                gap: 10px;
            }
            .controls-row button {
                width: 100%;
                margin: 0;
            }
            
            /* Focus / Pause Screen */
            #focus-timer-display,
            #pause-timer-display {
                font-size: 28vw;
            }
            #focus-task-display, #pause-title {
                font-size: 9vw;
            }
            .focus-buttons, .pause-buttons {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 90%;
                max-width: 350px;
                margin: 0 auto;
            }
            .focus-buttons button, .pause-buttons button {
                width: 100%;
                font-size: 24px;
                padding: 18px;
            }
            .btn-return-main {
                width: 90%;
                max-width: 350px;
                font-size: 20px;
            }

            /* Milestones Toast */
            #milestone-message {
                font-size: 22px;
                padding: 12px 25px;
                width: 90%;
            }

            /* Summary Modal */
            #summary-modal {
                padding: 20px 15px;
                justify-content: flex-start;
            }
            #summary-modal h2 {
                font-size: 32px;
                margin-bottom: 20px;
            }
            .summary-hero-value {
                font-size: 56px;
            }
            .summary-stats {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            .summary-stat-card {
                width: 100%;
                padding: 15px;
                box-sizing: border-box;
            }
            .summary-section {
                width: 100%;
                padding: 15px;
                box-sizing: border-box;
            }
            .ranking-row {
                font-size: 22px;
            }
            .ranking-time {
                font-size: 18px;
            }
            .best-session-display {
                font-size: 22px;
            }
            .summary-actions {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .summary-actions button, .btn-reset-log {
                width: 100%;
                padding: 15px;
                font-size: 18px;
            }

            /* Settings Modal & Recovery */
            #settings-modal {
                width: 90%;
                padding: 20px;
            }
            #recovery-banner {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .recovery-actions {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .recovery-actions button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Flash Overlay -->
    <div id="flash-overlay"></div>

    <!-- Milestone Message -->
    <div id="milestone-message"></div>

    <!-- Recovery Banner -->
    <div id="recovery-banner">
        <span class="recovery-text" id="recovery-text"></span>
        <div class="recovery-actions">
            <button class="btn-recovery btn-recovery-resume" id="btn-recovery-resume">再開</button>
            <button class="btn-recovery btn-recovery-discard" id="btn-recovery-discard">破棄</button>
        </div>
    </div>

    <!-- ================= Main Screen ================= -->
    <div id="main-screen" class="screen active">
        <div class="grid-container" id="task-slots"></div>
        <div class="controls-row">
            <button class="btn-add-task" id="btn-add-task" onclick="addTask()">＋ タスクを追加 (最大6個)</button>
            <button class="btn-summary" id="btn-show-summary" onclick="showSummary()">📊 今日の成果</button>
            <button class="btn-secondary" id="btn-show-settings" onclick="showSettings()">⚙️ 設定</button>
            <button class="btn-secondary" id="btn-export-main" onclick="exportLogsAsJSON()">📥 エクスポート</button>
        </div>
        <button class="btn-roulette" id="btn-roulette">決められない時（開始）</button>
    </div>

    <!-- ================= Focus Screen ================= -->
    <div id="focus-screen" class="screen">
        <div id="focus-task-display">タスク名</div>
        <div id="focus-timer-display">00:00</div>
        <div class="focus-buttons">
            <button class="btn-pause" id="btn-pause" onclick="pauseFocus()">⏸ 一時中断</button>
            <button class="btn-finish" id="btn-finish-focus" onclick="finishFocus()">■ 終了</button>
        </div>
    </div>

    <!-- ================= Pause Screen ================= -->
    <div id="pause-screen" class="screen">
        <h1 id="pause-title">一時中断中</h1>
        <div id="pause-timer-display">00:00</div>
        <div class="pause-buttons">
            <button class="btn-resume" id="btn-resume" onclick="resumeFocus()">▶ 再開</button>
            <button class="btn-pause-finish" id="btn-finish-pause" onclick="finishFromPause()">■ 終了</button>
        </div>
        <button class="btn-return-main" id="btn-return-main" onclick="returnToTaskSelection()">← タスク選択へ戻る</button>
    </div>

    <!-- ================= Summary Modal ================= -->
    <div id="summary-modal">
        <h2>📊 今日の成果</h2>
        <div id="summary-content"></div>
        <div class="summary-actions">
            <button class="btn-close-summary" id="btn-close-summary" onclick="closeSummary()">閉じる</button>
        </div>
        <div class="summary-actions" style="margin-top: 15px;">
            <button class="btn-export" id="btn-export-json" onclick="exportLogsAsJSON()">📥 JSON</button>
            <button class="btn-export" id="btn-export-csv" onclick="exportLogsAsCSV()">📥 CSV</button>
        </div>
        <button class="btn-reset-log" id="btn-reset-log" onclick="resetLog()">ログをリセット</button>
    </div>

    <!-- ================= Settings Modal ================= -->
    <div id="settings-modal">
        <h2>⚙️ 設定</h2>
        <div class="settings-content">
            <div class="settings-row">
                <span class="settings-label">節目通知</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="setting-milestone" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <span class="settings-label">音通知</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="setting-sound" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <button class="btn-save-settings" id="btn-save-settings" onclick="saveSettings()">保存</button>
    </div>

    <!-- ================= Logic ================= -->
    <script>
        // ================= Constants =================
        const STORAGE_KEYS = {
            tasks: 'adhd_focus_tasks',
            logs: 'adhd_focus_logs',
            settings: 'adhd_focus_settings',
            activeState: 'adhd_focus_active_state'
        };
        const MAX_TASKS = 6;
        const MILESTONE_INTERVAL = 15 * 60; // 15分（秒）

        // ================= State =================
        let tasks = [''];
        let currentTaskName = '';
        let focusSegmentStartedAt = null; // 集中区間の開始時刻（ms）
        let pauseStartedAt = null;        // 一時中断の開始時刻（ms）
        let focusIntervalId = null;
        let pauseIntervalId = null;
        let lastNotifiedMilestone = 0;    // 最後に通知した節目（秒）

        // 設定
        let settings = {
            milestoneEnabled: true,
            soundEnabled: true
        };

        // ================= Audio System =================
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(type) {
            if (!audioCtx || !settings.soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'start') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'milestone') {
                // 節目音：明瞭だが控えめな2音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // ================= Initialization =================
        function initApp() {
            loadSettings();
            loadTasks();
            renderTaskSlots();

            document.getElementById('btn-roulette').addEventListener('click', () => {
                initAudio();
                startRoulette();
            });

            // ページ復帰時の状態復元チェック
            checkActiveState();
        }

        // ================= Task Management =================
        function loadTasks() {
            const saved = localStorage.getItem(STORAGE_KEYS.tasks);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        tasks = parsed;
                    }
                } catch (e) { }
            }
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEYS.tasks, JSON.stringify(tasks));
        }

        function addTask() {
            if (tasks.length < MAX_TASKS) {
                tasks.push('');
                saveTasks();
                renderTaskSlots();
                setTimeout(() => {
                    const inputs = document.querySelectorAll('.task-slot input');
                    if (inputs.length > 0) inputs[inputs.length - 1].focus();
                }, 50);
            }
        }

        function removeTask(index) {
            if (tasks.length > 1) {
                tasks.splice(index, 1);
                saveTasks();
                renderTaskSlots();
            }
        }

        function renderTaskSlots() {
            const container = document.getElementById('task-slots');
            container.innerHTML = '';

            const addBtn = document.getElementById('btn-add-task');
            if (tasks.length >= MAX_TASKS) {
                addBtn.disabled = true;
                addBtn.innerText = '最大数 (6個) に達しています';
            } else {
                addBtn.disabled = false;
                addBtn.innerText = '＋ タスクを追加 (最大6個)';
            }

            container.style.gridTemplateColumns = '1fr';
            container.style.maxWidth = '';
            container.style.margin = '0 0 20px 0';

            for (let i = 0; i < tasks.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'task-slot';

                if (tasks.length > 1) {
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'btn-remove';
                    removeBtn.innerHTML = '×';
                    removeBtn.title = 'タスクを削除';
                    removeBtn.addEventListener('click', () => removeTask(i));
                    slot.appendChild(removeBtn);
                }

                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'タスクを入力...';
                input.value = tasks[i] || '';
                input.addEventListener('input', (e) => {
                    tasks[i] = e.target.value;
                    saveTasks();
                });
                slot.appendChild(input);

                const btn = document.createElement('button');
                btn.className = 'btn-start-direct';
                btn.innerText = '開始 ▶';
                btn.addEventListener('click', () => {
                    initAudio();
                    const taskName = input.value.trim() || '名称未設定タスク';
                    startFocus(taskName);
                });
                slot.appendChild(btn);
                container.appendChild(slot);
            }
        }

        // ================= Roulette =================
        function startRoulette() {
            const validTasks = tasks.map(t => t.trim()).filter(t => t !== '');
            if (validTasks.length === 0) {
                alert('少なくとも1つタスクを入力してください！');
                return;
            }

            let counter = 0;
            const rouletteBtn = document.getElementById('btn-roulette');
            const originalText = rouletteBtn.innerText;
            rouletteBtn.disabled = true;

            const rInterval = setInterval(() => {
                rouletteBtn.innerText = validTasks[Math.floor(Math.random() * validTasks.length)];
                counter++;
                if (counter > 15) {
                    clearInterval(rInterval);
                    const selected = validTasks[Math.floor(Math.random() * validTasks.length)];
                    rouletteBtn.innerText = originalText;
                    rouletteBtn.disabled = false;
                    startFocus(selected);
                }
            }, 60);
        }

        // ================= Screen Navigation =================
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // ================= Focus Timer =================
        function startFocus(taskName) {
            currentTaskName = taskName;
            focusSegmentStartedAt = Date.now();
            lastNotifiedMilestone = 0;

            document.getElementById('focus-task-display').innerText = currentTaskName;
            document.getElementById('focus-timer-display').innerText = '00:00';
            switchScreen('focus-screen');
            playBeep('start');

            saveActiveState({ status: 'focus', taskName: currentTaskName, focusStartedAt: focusSegmentStartedAt });

            clearAllIntervals();
            focusIntervalId = setInterval(tickFocusTimer, 1000);
        }

        function tickFocusTimer() {
            const now = Date.now();

            // 4:00 AM 境界チェック：集中中に日付をまたいだ場合、自動分割する
            const next4AM = getNext4AM(focusSegmentStartedAt);
            if (now >= next4AM) {
                // 4:00 までの区間を前日キーとして保存
                const splitSeconds = Math.round((next4AM - focusSegmentStartedAt) / 1000);
                saveFocusSegment(currentTaskName, focusSegmentStartedAt, next4AM, splitSeconds);

                // 4:00 から新しい日の区間として再スタート
                focusSegmentStartedAt = next4AM;
                lastNotifiedMilestone = 0;

                // activeState を更新
                saveActiveState({ status: 'focus', taskName: currentTaskName, focusStartedAt: focusSegmentStartedAt });

                // ユーザーへ通知
                showMilestoneMessage('日付が変わりました');
            }

            const elapsed = Math.floor((now - focusSegmentStartedAt) / 1000);
            document.getElementById('focus-timer-display').innerText = formatElapsedTime(elapsed);

            if (settings.milestoneEnabled) {
                handleFocusMilestone(elapsed);
            }
        }

        function pauseFocus() {
            // 集中区間を記録
            const endedAt = Date.now();
            const seconds = Math.round((endedAt - focusSegmentStartedAt) / 1000);
            saveFocusSegment(currentTaskName, focusSegmentStartedAt, endedAt, seconds);

            clearAllIntervals();

            // 一時中断画面へ
            pauseStartedAt = Date.now();
            document.getElementById('pause-timer-display').innerText = '00:00';
            switchScreen('pause-screen');

            saveActiveState({ status: 'pause', taskName: currentTaskName, pauseStartedAt: pauseStartedAt });

            pauseIntervalId = setInterval(tickPauseTimer, 1000);
        }

        function resumeFocus() {
            clearAllIntervals();

            // 新しい集中区間として再開
            focusSegmentStartedAt = Date.now();
            lastNotifiedMilestone = 0;

            document.getElementById('focus-task-display').innerText = currentTaskName;
            document.getElementById('focus-timer-display').innerText = '00:00';
            switchScreen('focus-screen');
            playBeep('start');

            saveActiveState({ status: 'focus', taskName: currentTaskName, focusStartedAt: focusSegmentStartedAt });

            focusIntervalId = setInterval(tickFocusTimer, 1000);
        }

        function finishFocus() {
            // 集中区間を記録
            const endedAt = Date.now();
            const seconds = Math.round((endedAt - focusSegmentStartedAt) / 1000);
            saveFocusSegment(currentTaskName, focusSegmentStartedAt, endedAt, seconds);

            clearAllIntervals();
            clearActiveState();

            // 集計画面へ
            showSummary();
        }

        function finishFromPause() {
            // 一時中断中からの終了：新たな集中区間は発生していない
            clearAllIntervals();
            clearActiveState();
            showSummary();
        }

        function returnToTaskSelection() {
            // 一時中断画面からメイン画面へ
            clearAllIntervals();
            clearActiveState();
            switchScreen('main-screen');
        }

        // ================= Pause Timer =================
        function tickPauseTimer() {
            const elapsed = Math.floor((Date.now() - pauseStartedAt) / 1000);
            document.getElementById('pause-timer-display').innerText = formatElapsedTime(elapsed);
            // 一時中断タイマーには通知なし
        }

        // ================= Milestone Notifications =================
        function handleFocusMilestone(elapsedSeconds) {
            const currentMilestone = Math.floor(elapsedSeconds / MILESTONE_INTERVAL) * MILESTONE_INTERVAL;

            if (currentMilestone > 0 && currentMilestone > lastNotifiedMilestone) {
                lastNotifiedMilestone = currentMilestone;
                const milestoneMinutes = currentMilestone / 60;
                const milestoneIndex = currentMilestone / MILESTONE_INTERVAL; // 1, 2, 3, 4...

                if (milestoneIndex % 2 === 1) {
                    // 奇数 (15, 45, 75, 105...): 赤フラッシュ
                    flashScreen();
                } else {
                    // 偶数 (30, 60, 90, 120...): 音＋文言
                    playBeep('milestone');
                    showMilestoneMessage(milestoneMinutes + '分経過');
                }
            }
        }

        function flashScreen() {
            const overlay = document.getElementById('flash-overlay');
            overlay.classList.remove('flash-red');
            // reflow を強制してアニメーションをリセット
            void overlay.offsetWidth;
            overlay.classList.add('flash-red');
            setTimeout(() => overlay.classList.remove('flash-red'), 1900);
        }

        function showMilestoneMessage(text) {
            const el = document.getElementById('milestone-message');
            el.classList.remove('show');
            el.innerText = text;
            void el.offsetWidth;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3600);
        }

        // ================= Day Key (4AM Boundary) =================
        function getDayKey(date) {
            const d = new Date(date);
            // 4時前なら前日扱い
            if (d.getHours() < 4) {
                d.setDate(d.getDate() - 1);
            }
            return d.getFullYear() + '-'
                + String(d.getMonth() + 1).padStart(2, '0') + '-'
                + String(d.getDate()).padStart(2, '0');
        }

        function getTodayKey() {
            return getDayKey(new Date());
        }

        // 指定時刻以降の次の4:00 AMのタイムスタンプを返す
        function getNext4AM(fromTimestamp) {
            const d = new Date(fromTimestamp);
            // 当日の4:00 AMを生成
            const target = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 4, 0, 0, 0);
            // 既に4:00 AM以降なら翌日の4:00 AM
            if (d >= target) {
                target.setDate(target.getDate() + 1);
            }
            return target.getTime();
        }

        // ================= Focus Segment Logging =================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function loadLogs() {
            const data = localStorage.getItem(STORAGE_KEYS.logs);
            if (!data) return {};
            try {
                return JSON.parse(data);
            } catch (e) {
                return {};
            }
        }

        function saveLogs(logs) {
            localStorage.setItem(STORAGE_KEYS.logs, JSON.stringify(logs));
        }

        function saveFocusSegment(taskName, startedAt, endedAt, seconds) {
            if (seconds <= 0) return; // 0秒以下は記録しない

            const logs = loadLogs();
            const dayKey = getDayKey(new Date(startedAt));

            if (!logs[dayKey]) {
                logs[dayKey] = [];
            }

            logs[dayKey].push({
                id: generateId(),
                taskName: taskName,
                startedAt: startedAt,
                endedAt: endedAt,
                seconds: seconds
            });

            saveLogs(logs);
        }

        // ================= Summary Calculation =================
        function getTodayLogs() {
            const logs = loadLogs();
            const todayKey = getTodayKey();
            return logs[todayKey] || [];
        }

        function getTotalFocusTime(todayLogs) {
            return todayLogs.reduce((sum, log) => sum + log.seconds, 0);
        }

        function getLongestFocusSegment(todayLogs) {
            if (todayLogs.length === 0) return 0;
            return Math.max(...todayLogs.map(log => log.seconds));
        }

        function getStartCount(todayLogs) {
            return todayLogs.length;
        }

        function getTaskRanking(todayLogs) {
            const totals = {};
            for (const log of todayLogs) {
                if (!totals[log.taskName]) {
                    totals[log.taskName] = 0;
                }
                totals[log.taskName] += log.seconds;
            }
            return Object.entries(totals)
                .sort((a, b) => b[1] - a[1])
                .map(([task, seconds]) => ({ task, seconds }));
        }

        function getBestSession(todayLogs) {
            if (todayLogs.length === 0) return null;
            const best = todayLogs.reduce((a, b) => a.seconds > b.seconds ? a : b);
            return { task: best.taskName, seconds: best.seconds };
        }

        // ================= Summary Rendering =================
        function showSummary() {
            const todayLogs = getTodayLogs();
            const container = document.getElementById('summary-content');

            if (todayLogs.length === 0) {
                container.innerHTML = '<div class="summary-empty">まだ記録がありません。<br>タスクを選んで集中を始めましょう。</div>';
            } else {
                const totalSeconds = getTotalFocusTime(todayLogs);
                const longestSeconds = getLongestFocusSegment(todayLogs);
                const startCount = getStartCount(todayLogs);
                const ranking = getTaskRanking(todayLogs);
                const bestSession = getBestSession(todayLogs);

                let html = '';

                // 主役：累積集中時間
                html += '<div class="summary-hero">';
                html += '<div class="summary-hero-label">累積集中時間</div>';
                html += '<div class="summary-hero-value">' + formatDuration(totalSeconds) + '</div>';
                html += '</div>';

                // 統計カード
                html += '<div class="summary-stats">';
                html += '<div class="summary-stat-card">';
                html += '<div class="summary-stat-label">最長連続</div>';
                html += '<div class="summary-stat-value">' + formatDuration(longestSeconds) + '</div>';
                html += '</div>';
                html += '<div class="summary-stat-card">';
                html += '<div class="summary-stat-label">着手回数</div>';
                html += '<div class="summary-stat-value">' + startCount + '回</div>';
                html += '</div>';
                html += '</div>';

                // ベストセッション
                if (bestSession) {
                    html += '<div class="summary-section">';
                    html += '<div class="summary-section-title">今日のベストセッション</div>';
                    html += '<div class="best-session-display">';
                    html += '<span class="task-name">' + escapeHtml(bestSession.task) + '</span> ';
                    html += formatDuration(bestSession.seconds);
                    html += '</div>';
                    html += '</div>';
                }

                // タスク別ランキング
                if (ranking.length > 0) {
                    html += '<div class="summary-section">';
                    html += '<div class="summary-section-title">タスク別ランキング</div>';
                    for (let i = 0; i < ranking.length; i++) {
                        html += '<div class="ranking-row">';
                        html += '<span class="ranking-position">' + (i + 1) + '.</span>';
                        html += '<span class="ranking-task">' + escapeHtml(ranking[i].task) + '</span>';
                        html += '<span class="ranking-time">' + formatDuration(ranking[i].seconds) + '</span>';
                        html += '</div>';
                    }
                    html += '</div>';
                }

                container.innerHTML = html;
            }

            document.getElementById('summary-modal').classList.add('active');
        }

        function closeSummary() {
            document.getElementById('summary-modal').classList.remove('active');
            switchScreen('main-screen');
        }

        function resetLog() {
            if (confirm('今日の集中ログをリセットしますか？')) {
                const logs = loadLogs();
                const todayKey = getTodayKey();
                delete logs[todayKey];
                saveLogs(logs);
                showSummary(); // 画面を更新
            }
        }

        // ================= Export =================
        function exportLogsAsJSON() {
            const logs = loadLogs();
            const exportData = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                tasks: tasks,
                settings: settings,
                logs: logs
            };

            const json = JSON.stringify(exportData, null, 2);
            const todayKey = getTodayKey();
            downloadFile(json, 'adhd_focus_log_' + todayKey + '.json', 'application/json');
        }

        function exportLogsAsCSV() {
            const logs = loadLogs();
            const rows = ['日付,タスク名,開始時刻,終了時刻,集中秒数'];

            for (const [dayKey, segments] of Object.entries(logs)) {
                for (const seg of segments) {
                    const startStr = new Date(seg.startedAt).toLocaleString('ja-JP');
                    const endStr = new Date(seg.endedAt).toLocaleString('ja-JP');
                    const taskEscaped = '"' + seg.taskName.replace(/"/g, '""') + '"';
                    rows.push([dayKey, taskEscaped, startStr, endStr, seg.seconds].join(','));
                }
            }

            const csv = rows.join('\n');
            const todayKey = getTodayKey();
            // BOM付きUTF-8でExcel互換
            downloadFile('\uFEFF' + csv, 'adhd_focus_log_' + todayKey + '.csv', 'text/csv;charset=utf-8');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ================= Settings =================
        function loadSettings() {
            const saved = localStorage.getItem(STORAGE_KEYS.settings);
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    if (typeof s.milestoneEnabled === 'boolean') settings.milestoneEnabled = s.milestoneEnabled;
                    if (typeof s.soundEnabled === 'boolean') settings.soundEnabled = s.soundEnabled;
                } catch (e) { }
            }
        }

        function showSettings() {
            document.getElementById('setting-milestone').checked = settings.milestoneEnabled;
            document.getElementById('setting-sound').checked = settings.soundEnabled;
            document.getElementById('settings-modal').classList.add('active');
        }

        function saveSettings() {
            settings.milestoneEnabled = document.getElementById('setting-milestone').checked;
            settings.soundEnabled = document.getElementById('setting-sound').checked;

            localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings));
            document.getElementById('settings-modal').classList.remove('active');
        }

        // ================= State Persistence =================
        function saveActiveState(state) {
            localStorage.setItem(STORAGE_KEYS.activeState, JSON.stringify(state));
        }

        function clearActiveState() {
            localStorage.removeItem(STORAGE_KEYS.activeState);
        }

        function checkActiveState() {
            const data = localStorage.getItem(STORAGE_KEYS.activeState);
            if (!data) return;

            try {
                const state = JSON.parse(data);
                if (!state || !state.status) {
                    clearActiveState();
                    return;
                }

                const banner = document.getElementById('recovery-banner');
                const text = document.getElementById('recovery-text');

                if (state.status === 'focus') {
                    const elapsed = Math.floor((Date.now() - state.focusStartedAt) / 1000);
                    text.innerText = '集中中の状態が残っています（' + state.taskName + ' / ' + formatElapsedTime(elapsed) + '経過）';
                } else if (state.status === 'pause') {
                    text.innerText = '一時中断中の状態が残っています（' + state.taskName + '）';
                } else {
                    clearActiveState();
                    return;
                }

                banner.classList.add('active');

                document.getElementById('btn-recovery-resume').onclick = () => {
                    banner.classList.remove('active');
                    initAudio();

                    if (state.status === 'focus') {
                        currentTaskName = state.taskName;
                        focusSegmentStartedAt = state.focusStartedAt;
                        // 既に通知済みの節目をスキップ
                        const elapsed = Math.floor((Date.now() - focusSegmentStartedAt) / 1000);
                        lastNotifiedMilestone = Math.floor(elapsed / MILESTONE_INTERVAL) * MILESTONE_INTERVAL;

                        document.getElementById('focus-task-display').innerText = currentTaskName;
                        switchScreen('focus-screen');
                        clearAllIntervals();
                        focusIntervalId = setInterval(tickFocusTimer, 1000);
                        tickFocusTimer(); // 即座に表示更新
                    } else if (state.status === 'pause') {
                        currentTaskName = state.taskName;
                        pauseStartedAt = state.pauseStartedAt;
                        switchScreen('pause-screen');
                        clearAllIntervals();
                        pauseIntervalId = setInterval(tickPauseTimer, 1000);
                        tickPauseTimer(); // 即座に表示更新
                    }
                };

                document.getElementById('btn-recovery-discard').onclick = () => {
                    banner.classList.remove('active');

                    // 集中中だった場合、その区間を記録してから破棄
                    if (state.status === 'focus' && state.focusStartedAt) {
                        const endedAt = Date.now();
                        const seconds = Math.round((endedAt - state.focusStartedAt) / 1000);
                        if (seconds > 0) {
                            saveFocusSegment(state.taskName, state.focusStartedAt, endedAt, seconds);
                        }
                    }

                    clearActiveState();
                };

            } catch (e) {
                clearActiveState();
            }
        }

        // ================= Utility Functions =================
        function formatElapsedTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            if (h > 0) {
                return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function formatDuration(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);

            if (h > 0 && m > 0) {
                return h + '時間' + m + '分';
            } else if (h > 0) {
                return h + '時間';
            } else if (m > 0) {
                return m + '分';
            } else {
                return '1分未満';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearAllIntervals() {
            if (focusIntervalId) {
                clearInterval(focusIntervalId);
                focusIntervalId = null;
            }
            if (pauseIntervalId) {
                clearInterval(pauseIntervalId);
                pauseIntervalId = null;
            }
        }

        // ================= Start =================
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

</html>
